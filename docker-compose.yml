version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: ecommerce_app

    working_dir: /var/www

    volumes:
      - ./:/var/www

    ports:
      - "5173:5173"

    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started

    networks:
      - laravel

    tty: true

  nginx:
    image: nginx:alpine

    container_name: ecommerce_nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - laravel

  mysql:
    image: mysql:8.4

    container_name: ecommerce_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

    networks:
      - laravel

  redis:
    image: redis:7-alpine

    container_name: ecommerce_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

    networks:
      - laravel

  mailpit:
    image: axllent/mailpit

    container_name: ecommerce_mailpit

    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

    networks:
      - laravel

volumes:
  mysql_data:

networks:
  laravel:
    driver: bridge
